name: PipelineIQ DevSecOps



on:

  workflow_dispatch:

  push:

    branches: [main, master]

  pull_request:

    branches: [main, master]



permissions:

  contents: read

  security-events: write

  actions: read



env:

  CI: true



jobs:

  # Suggested from AI: Install Dependencies
  install:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PIPELINEIQ_STAGE_SOURCE: ai-suggested
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: |
          npm ci || npm install

  # Suggested from AI: Unit & Integration Tests
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [install]
    env:
      PIPELINEIQ_STAGE_SOURCE: ai-suggested
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: |
          npm ci || npm install
      - run: |
          npm test -- --runInBand

  sast:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [install]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: |
          python -m pip install --upgrade semgrep
      - run: |
          semgrep scan --config auto --sarif --output semgrep.sarif || true
      - uses: actions/upload-artifact@v4
        with:
          name: semgrep
          path: semgrep.sarif
          if-no-files-found: ignore

  filesystem-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [install]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: HIGH,CRITICAL
      - uses: actions/upload-artifact@v4
        with:
          name: trivy-fs
          path: trivy-fs.sarif
          if-no-files-found: ignore

  secrets-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [install]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@main
        with:
          path: ./

  # Suggested from AI: Dependency Vulnerability Audit
  dep-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [install]
    continue-on-error: true
    env:
      PIPELINEIQ_STAGE_SOURCE: ai-suggested
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: |
          npm ci || npm install
      - run: |
          npm audit --audit-level=high || true

  # Suggested from AI: Build Application
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [install]
    env:
      PIPELINEIQ_STAGE_SOURCE: ai-suggested
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: |
          npm run build --if-present

  # Suggested from AI: Container Security Scan
  container-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [install]
    continue-on-error: true
    env:
      PIPELINEIQ_STAGE_SOURCE: ai-suggested
    steps:
      - uses: actions/checkout@v4
      - run: |
          docker build -t pipelineiq-node-todo-cicd:scan .
      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: pipelineiq-node-todo-cicd:scan
          format: sarif
          output: trivy-image.sarif
          severity: HIGH,CRITICAL
      - uses: actions/upload-artifact@v4
        with:
          name: trivy-image
          path: trivy-image.sarif
          if-no-files-found: ignore

  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [test, sast, filesystem-scan, secrets-scan, dep-audit, build, container-scan]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo "PipelineIQ quality gate evaluating workflow results"
      - run: |
          if [ "${{ needs.test.result }}" = "success" ]; then
            echo "::notice title=PipelineIQ Quality Gate::test passed"
          else
            echo "::error title=PipelineIQ Quality Gate::test failed with result: ${{ needs.test.result }}"
            exit 1
          fi
      - run: |
          if [ "${{ needs.sast.result }}" = "success" ]; then
            echo "::notice title=PipelineIQ Advisory Check::sast completed successfully"
          else
            echo "::warning title=PipelineIQ Advisory Check::sast completed with result: ${{ needs.sast.result }}. Review this job because it may indicate a security/tooling issue."
          fi
      - run: |
          if [ "${{ needs.filesystem-scan.result }}" = "success" ]; then
            echo "::notice title=PipelineIQ Advisory Check::filesystem-scan completed successfully"
          else
            echo "::warning title=PipelineIQ Advisory Check::filesystem-scan completed with result: ${{ needs.filesystem-scan.result }}. Review this job because it may indicate a security/tooling issue."
          fi
      - run: |
          if [ "${{ needs.secrets-scan.result }}" = "success" ]; then
            echo "::notice title=PipelineIQ Quality Gate::secrets-scan passed"
          else
            echo "::error title=PipelineIQ Quality Gate::secrets-scan failed with result: ${{ needs.secrets-scan.result }}"
            exit 1
          fi
      - run: |
          if [ "${{ needs.dep-audit.result }}" = "success" ]; then
            echo "::notice title=PipelineIQ Advisory Check::dep-audit completed successfully"
          else
            echo "::warning title=PipelineIQ Advisory Check::dep-audit completed with result: ${{ needs.dep-audit.result }}. Review this job because it may indicate a security/tooling issue."
          fi
      - run: |
          if [ "${{ needs.build.result }}" = "success" ]; then
            echo "::notice title=PipelineIQ Quality Gate::build passed"
          else
            echo "::error title=PipelineIQ Quality Gate::build failed with result: ${{ needs.build.result }}"
            exit 1
          fi
      - run: |
          if [ "${{ needs.container-scan.result }}" = "success" ]; then
            echo "::notice title=PipelineIQ Advisory Check::container-scan completed successfully"
          else
            echo "::warning title=PipelineIQ Advisory Check::container-scan completed with result: ${{ needs.container-scan.result }}. Review this job because it may indicate a security/tooling issue."
          fi

  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [quality-gate]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo "PipelineIQ workflow completed with ${{ needs.quality-gate.result }}"
